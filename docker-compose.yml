services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: sre-api
    ports:
      - "8000:8000"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
      image: grafana/grafana-oss:latest
      container_name: grafana
      ports:
        - "3001:3000"
      volumes:
        - ./observability/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
        - ./observability/grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml
        - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/files
      environment:
        - GF_SECURITY_ADMIN_PASSWORD=admin # Change this to a secure password in production
        - GF_USERS_ALLOW_SIGN_UP=false
      networks:
        - monitoring
      depends_on:
      - prometheus

networks:
  monitoring:
    driver: bridge